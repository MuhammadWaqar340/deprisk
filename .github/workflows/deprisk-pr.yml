name: DepRisk PR Check

# Self-check on this repo: build CLI from the PR checkout (not npm — 0.7.0 may be unpublished).
on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "pnpm-lock.yaml"
      - "yarn.lock"
      - "src/**"
      - ".github/workflows/deprisk-pr.yml"

jobs:
  deprisk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Run DepRisk scan vs base
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1 || true
          if git cat-file -e "origin/${{ github.base_ref }}:package-lock.json" 2>/dev/null; then
            git show "origin/${{ github.base_ref }}:package-lock.json" > /tmp/base-package-lock.json
            pnpm exec deprisk scan \
              --base-lock /tmp/base-package-lock.json \
              --head-lock ./package-lock.json \
              --path . \
              --markdown \
              --fail-on high || true
          else
            echo "No package-lock.json on base branch — skipping lockfile bump scan."
            echo "Smoke-check: vite 8.0.0 → 8.1.0"
            pnpm exec deprisk check vite --from 8.0.0 --to 8.1.0 --path . --markdown --fail-on high || true
          fi
